version: '3.8'

services:
  # FastAPI backend service
  backend:
    build: . # Build from the Dockerfile in the current directory
    container_name: full-stack-intro-backend
    ports:
      - "8000:8000" # FastAPI default port 8000
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://notes_user:notes_pass@postgres:5433/notes_db
      - PYTHONUNBUFFERED=1 # Ensure logs/prints are displayed in real-time
    depends_on:
      - postgres
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL database service
  postgres:
    image: postgres:15-alpine
    container_name: notes-db
    environment:
      POSTGRES_USER: notes_user
      POSTGRES_PASSWORD: notes_pass
      POSTGRES_DB: notes_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
